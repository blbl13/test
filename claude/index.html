<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="终极跨平台学习管理笔记工具">
    <title>学习笔记工具</title>

    <!-- PWA配置 -->
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="/manifest.json">

    <!-- 图标 -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    <!-- CSS -->
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/themes.css">

    <!-- 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 应用容器 -->
    <div id="app">
        <!-- 头部导航 -->
        <header class="app-header">
            <div class="logo">
                <h1>📚 学习笔记</h1>
            </div>
            <nav class="main-nav">
                <button class="nav-btn active" data-view="notes">笔记</button>
                <button class="nav-btn" data-view="pomodoro">番茄钟</button>
                <button class="nav-btn" data-view="anki">卡片</button>
                <button class="nav-btn" data-view="stats">统计</button>
                <button class="nav-btn" data-view="timeline">时间线</button>
            </nav>
            <div class="header-actions">
                <button class="icon-btn theme-toggle" title="切换主题">
                    <span class="icon">🌓</span>
                </button>
                <button class="icon-btn search-toggle" title="搜索">
                    <span class="icon">🔍</span>
                </button>
                <button class="icon-btn settings-toggle" title="设置">
                    <span class="icon">⚙️</span>
                </button>
            </div>
        </header>

        <!-- 搜索栏 -->
        <div class="search-bar hidden">
            <input type="text" id="search-input" placeholder="搜索笔记..." autocomplete="off">
            <div class="search-results"></div>
        </div>

        <!-- 主内容区域 -->
        <main class="main-content">
            <!-- 笔记视图 -->
            <div class="view-container notes-view active">
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <button class="btn-primary new-note-btn">
                            <span class="icon">➕</span> 新建笔记
                        </button>
                    </div>
                    <div class="tag-filter">
                        <h3>标签</h3>
                        <div class="tag-list"></div>
                    </div>
                    <div class="note-list"></div>
                </aside>
                <div class="editor-container">
                    <div class="editor-header">
                        <input type="text" class="note-title" placeholder="笔记标题...">
                        <div class="editor-actions">
                            <button class="icon-btn preview-toggle" title="预览">
                                <span class="icon">👁️</span>
                            </button>
                            <button class="icon-btn save-btn" title="保存">
                                <span class="icon">💾</span>
                            </button>
                        </div>
                    </div>
                    <div class="editor-content">
                        <textarea class="note-editor" placeholder="开始书写...（支持 Markdown）"></textarea>
                        <div class="note-preview markdown-body hidden"></div>
                    </div>
                </div>
            </div>

            <!-- 番茄钟视图 -->
            <div class="view-container pomodoro-view">
                <div class="pomodoro-container">
                    <div class="timer-display">
                        <div class="time-left">25:00</div>
                        <div class="timer-controls">
                            <button class="btn-primary start-btn">开始</button>
                            <button class="btn-secondary pause-btn hidden">暂停</button>
                            <button class="btn-secondary reset-btn">重置</button>
                        </div>
                    </div>
                    <div class="pomodoro-settings">
                        <div class="setting-group">
                            <label>工作时间（分钟）</label>
                            <input type="number" class="work-duration" value="25" min="1" max="60">
                        </div>
                        <div class="setting-group">
                            <label>休息时间（分钟）</label>
                            <input type="number" class="break-duration" value="5" min="1" max="30">
                        </div>
                    </div>
                    <div class="pomodoro-stats">
                        <h3>今日统计</h3>
                        <div class="stats-grid">
                            <div class="stat-item">
                                <span class="stat-label">完成番茄钟</span>
                                <span class="stat-value pomodoro-count">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">专注时长</span>
                                <span class="stat-value focus-time">0 分钟</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Anki卡片视图 -->
            <div class="view-container anki-view">
                <div class="anki-container">
                    <div class="anki-header">
                        <button class="btn-primary new-card-btn">
                            <span class="icon">➕</span> 新建卡片
                        </button>
                        <button class="btn-secondary review-btn">
                            <span class="icon">📖</span> 开始复习
                        </button>
                    </div>
                    <div class="card-list"></div>
                    <div class="review-container hidden">
                        <div class="card-display">
                            <div class="card-front"></div>
                            <div class="card-back hidden"></div>
                        </div>
                        <div class="review-controls">
                            <button class="btn-secondary difficulty-btn" data-difficulty="again">重来</button>
                            <button class="btn-secondary difficulty-btn" data-difficulty="hard">困难</button>
                            <button class="btn-secondary difficulty-btn" data-difficulty="good">良好</button>
                            <button class="btn-secondary difficulty-btn" data-difficulty="easy">简单</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 统计视图 -->
            <div class="view-container stats-view">
                <div class="stats-container">
                    <h2>学习统计</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>📝 笔记统计</h3>
                            <div class="stat-item">
                                <span class="stat-label">总笔记数</span>
                                <span class="stat-value total-notes">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">总字数</span>
                                <span class="stat-value total-words">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">标签数量</span>
                                <span class="stat-value tag-count">0</span>
                            </div>
                        </div>
                        <div class="stat-card">
                            <h3>🍅 番茄钟统计</h3>
                            <div class="stat-item">
                                <span class="stat-label">今日专注时长</span>
                                <span class="stat-value today-focus">0 分钟</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">本周专注时长</span>
                                <span class="stat-value week-focus">0 分钟</span>
                            </div>
                        </div>
                        <div class="stat-card">
                            <h3>🃏 复习统计</h3>
                            <div class="stat-item">
                                <span class="stat-label">总卡片数</span>
                                <span class="stat-value total-cards">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">今日复习</span>
                                <span class="stat-value today-reviews">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">记忆保持率</span>
                                <span class="stat-value retention-rate">0%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 时间线视图 -->
            <div class="view-container timeline-view">
                <div class="timeline-container">
                    <h2>学习时间线</h2>
                    <div class="timeline-content"></div>
                </div>
            </div>
        </main>

        <!-- 设置模态框 -->
        <div class="modal settings-modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>设置</h3>
                    <button class="icon-btn close-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="settings-section">
                        <h4>外观</h4>
                        <div class="setting-item">
                            <label>主题</label>
                            <select class="theme-selector">
                                <option value="light">浅色模式</option>
                                <option value="dark">深色模式</option>
                                <option value="professional">专业模式</option>
                                <option value="blue">蓝色主题</option>
                                <option value="green">绿色主题</option>
                            </select>
                        </div>
                    </div>
                    <div class="settings-section">
                        <h4>数据</h4>
                        <div class="setting-item">
                            <button class="btn-secondary export-btn">导出数据</button>
                        </div>
                        <div class="setting-item">
                            <button class="btn-secondary import-btn">导入数据</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="/js/lib/marked.min.js"></script>
    <script src="/js/utils/storage.js"></script>
    <script src="/js/utils/helpers.js"></script>
    <script src="/js/models/Note.js"></script>
    <script src="/js/models/Tag.js"></script>
    <script src="/js/models/Pomodoro.js"></script>
    <script src="/js/models/AnkiCard.js"></script>
    <script src="/js/controllers/NoteController.js"></script>
    <script src="/js/controllers/PomodoroController.js"></script>
    <script src="/js/controllers/AnkiController.js"></script>
    <script src="/js/controllers/StatsController.js"></script>
    <script src="/js/controllers/ThemeController.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
