<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线模式 - 学习笔记工具</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .offline-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }

        .offline-icon {
            font-size: 5rem;
            margin-bottom: 2rem;
        }

        .offline-title {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--text-color);
        }

        .offline-message {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            color: var(--secondary-color);
            max-width: 600px;
        }

        .offline-features {
            margin-bottom: 2rem;
        }

        .offline-features h3 {
            margin-bottom: 1rem;
            color: var(--text-color);
        }

        .feature-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .feature-list li {
            padding: 0.5rem 0;
            color: var(--secondary-color);
        }

        .offline-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-primary, .btn-secondary {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background-color: var(--border-color);
            color: var(--text-color);
        }

        .btn-secondary:hover {
            opacity: 0.8;
        }

        .offline-status {
            margin-top: 2rem;
            padding: 1rem;
            background-color: var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--secondary-color);
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .mobile-offline-actions {
            display: none;
        }

        @media (max-width: 768px) {
            .offline-container {
                padding: 1rem;
            }

            .offline-icon {
                font-size: 4rem;
            }

            .offline-title {
                font-size: 1.5rem;
            }

            .offline-actions {
                flex-direction: column;
                width: 100%;
            }

            .btn-primary, .btn-secondary {
                width: 100%;
            }

            .mobile-offline-actions {
                display: block;
                margin-top: 2rem;
            }

            .desktop-offline-actions {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📱</div>
        <h1 class="offline-title">离线模式</h1>
        <p class="offline-message">
            您当前处于离线状态，但别担心！学习笔记工具已切换到离线模式，您可以继续使用大部分功能。
        </p>

        <div class="offline-features">
            <h3>可用功能</h3>
            <ul class="feature-list">
                <li>✅ 创建和编辑笔记</li>
                <li>✅ 查看已有笔记</li>
                <li>✅ 使用番茄钟计时器</li>
                <li>✅ 复习Anki卡片</li>
                <li>✅ 查看学习统计</li>
                <li>✅ 管理标签和分类</li>
                <li>✅ 主题切换</li>
                <li>✅ 数据本地存储</li>
            </ul>
        </div>

        <div class="offline-actions desktop-offline-actions">
            <button class="btn-primary" onclick="refreshPage()">🔄 刷新页面</button>
            <button class="btn-secondary" onclick="openNotes()">📝 查看笔记</button>
            <button class="btn-secondary" onclick="startPomodoro()">🍅 开始番茄钟</button>
            <button class="btn-secondary" onclick="showStats()">📊 查看统计</button>
        </div>

        <div class="offline-actions mobile-offline-actions">
            <button class="btn-primary" onclick="refreshPage()">🔄 刷新</button>
            <button class="btn-secondary" onclick="openNotes()">📝 笔记</button>
            <button class="btn-secondary" onclick="startPomodoro()">🍅 番茄钟</button>
        </div>

        <div class="offline-status">
            <div class="status-item">
                <span class="loading-spinner"></span>
                <span>正在等待网络连接...</span>
            </div>
            <div class="status-item">
                📅 上次同步: <span id="last-sync">从未</span>
            </div>
            <div class="status-item">
                💾 本地数据: <span id="local-data-size">加载中...</span>
            </div>
        </div>
    </div>

    <script>
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateStatus();
            startStatusCheck();
        });

        // 更新状态显示
        function updateStatus() {
            // 更新最后同步时间
            const lastSync = localStorage.getItem('lastSyncTime');
            if (lastSync) {
                document.getElementById('last-sync').textContent = new Date(lastSync).toLocaleString();
            }

            // 更新本地数据大小
            calculateLocalDataSize();
        }

        // 开始状态检查
        function startStatusCheck() {
            setInterval(function() {
                checkOnlineStatus();
                updateStatus();
            }, 5000);
        }

        // 检查在线状态
        function checkOnlineStatus() {
            if (navigator.onLine) {
                // 在线时自动同步
                syncData();
                // 延迟跳转到主页面
                setTimeout(function() {
                    window.location.href = '/';
                }, 2000);
            }
        }

        // 同步数据
        async function syncData() {
            try {
                const lastSync = localStorage.getItem('lastSyncTime');
                const syncData = {
                    notes: await getLocalData('notes'),
                    pomodoros: await getLocalData('pomodoros'),
                    ankiCards: await getLocalData('ankiCards'),
                    tags: await getLocalData('tags'),
                    stats: await getLocalData('stats'),
                    lastSync: lastSync || null
                };

                // 发送同步消息到Service Worker
                if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                    navigator.serviceWorker.controller.postMessage({
                        type: 'sync-data',
                        data: syncData
                    });
                }

                // 更新最后同步时间
                localStorage.setItem('lastSyncTime', new Date().toISOString());
            } catch (error) {
                console.error('Sync error:', error);
            }
        }

        // 获取本地数据
        async function getLocalData(storeName) {
            try {
                // 尝试从IndexedDB获取数据
                if (window.indexedDB) {
                    const db = await openDatabase();
                    const data = await db.getAll(storeName);
                    return data;
                }
            } catch (error) {
                console.error('Error getting local data:', error);
            }

            // 从localStorage获取数据
            const data = localStorage.getItem(storeName);
            return data ? JSON.parse(data) : [];
        }

        // 计算本地数据大小
        function calculateLocalDataSize() {
            try {
                let totalSize = 0;

                // 计算localStorage大小
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    const value = localStorage.getItem(key);
                    totalSize += key.length + value.length;
                }

                // 格式化大小
                const sizeText = formatFileSize(totalSize);
                document.getElementById('local-data-size').textContent = sizeText;
            } catch (error) {
                console.error('Error calculating data size:', error);
            }
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 页面操作函数
        function refreshPage() {
            window.location.reload();
        }

        function openNotes() {
            window.location.href = '/?view=notes';
        }

        function startPomodoro() {
            window.location.href = '/?view=pomodoro';
        }

        function showStats() {
            window.location.href = '/?view=stats';
        }

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.key === 'r' && e.ctrlKey) {
                e.preventDefault();
                refreshPage();
            } else if (e.key === 'n') {
                e.preventDefault();
                openNotes();
            } else if (e.key === 'p') {
                e.preventDefault();
                startPomodoro();
            }
        });

        // IndexedDB操作
        function openDatabase() {
            return new Promise((resolve, reject) => {
                if (!window.indexedDB) {
                    reject(new Error('IndexedDB not supported'));
                    return;
                }

                const request = indexedDB.open('NoteDB', 1);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);
            });
        }

        // 监听Service Worker消息
        if (navigator.serviceWorker) {
            navigator.serviceWorker.addEventListener('message', function(event) {
                const { type, data } = event.data;

                switch (type) {
                    case 'sync-complete':
                        console.log('Sync completed:', data);
                        localStorage.setItem('lastSyncTime', new Date().toISOString());
                        updateStatus();
                        break;
                    case 'offline-ready':
                        console.log('Offline mode ready');
                        break;
                }
            });
        }
    </script>
</body>
</html>
