<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note-Taking Tool with Anki Flashcards and Pomodoro Timer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Note-Taking Web Tool</h1>
        <nav>
            <ul>
                <li><a href="#flashcards">Anki Flashcards</a></li>
                <li><a href="#pomodoro">Pomodoro Timer</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="flashcards">
            <h2>Anki Flashcards</h2>
            <p>Create and review flashcards to enhance your learning experience.</p>
            <textarea placeholder="Enter your flashcard question"></textarea>
            <textarea placeholder="Enter your flashcard answer"></textarea>
            <button>Create Flashcard</button>
        </section>
        <section id="pomodoro">
            <h2>Pomodoro Timer</h2>
            <p>Boost your productivity with the Pomodoro technique.</p>
            <button>Start Timer</button>
            <button>Stop Timer</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Note-Taking Tool</p>
    </footer>
</body>
</html>
